name: discordmcp
services:
  discordmcp-proxy:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.5
    restart: unless-stopped
    cpu_shares: 50
    expose:
      - 80
    user: "root"
    environment:
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: discordmcp
      BACKEND_PORT: "9640"
      LISTEN_PORT: "80"
    depends_on:
      - discordmcp
    networks:
      - pcs
    labels:
      caddy_0: discordmcp-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: discordmcp-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: discordmcp-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"

  discordmcp:
    image: ghcr.io/yundera/discord-mcp:1.0.0
    container_name: discordmcp
    hostname: discordmcp
    user: $PUID:$PGID
    restart: unless-stopped
    expose:
      - 9640
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - PORT=9640
    volumes:
      - type: bind
        source: /DATA/AppData/discordmcp/
        target: /app/data
    networks:
      - pcs

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  index: /?hash=$AUTH_HASH
  main: discordmcp

  architectures:
    - amd64
    - arm64
  author: Yundera Team
  category: Chat
  description:
    en_us: |
      Discord MCP is a bridge between Discord and the Model Context Protocol (MCP).
      It acts as an MCP server exposing Discord tools like send_message, send_embed, and list_channels to LLMs.

      Features:
      - Send text messages and rich embeds to Discord channels via MCP tools
      - List available text channels in a Discord server
      - Beacon auto-discovery for seamless integration
      - Web dashboard for runtime configuration (bot token, default channel)
      - Stateless HTTP transport for MCP connectivity
    zh_cn: |
      Discord MCP 是 Discord 和模型上下文协议 (MCP) 之间的桥梁。
      它作为 MCP 服务器，向 LLM 公开 send_message、send_embed 和 list_channels 等 Discord 工具。
    ko_kr: |
      Discord MCP는 Discord와 Model Context Protocol(MCP) 사이의 브리지입니다.
      send_message, send_embed, list_channels 등의 Discord 도구를 LLM에 제공하는 MCP 서버입니다.
  developer: Yundera Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/DiscordMCP/icon.png
  tagline:
    en_us: Discord MCP bridge for AI-powered bot interactions
    zh_cn: 用于 AI 驱动的机器人交互的 Discord MCP 桥梁
    ko_kr: AI 기반 봇 상호작용을 위한 Discord MCP 브리지
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/DiscordMCP/icon.png
  title:
    en_us: Discord MCP
  chips:
    - key: mcp
      name:
        en_us: MCP
  tips:
    before_install:
      en_us: |
        **Getting Started**

        After installation, open the Web UI to configure your Discord bot token.

        **Prerequisites:**
        1. Create a Discord bot at https://discord.com/developers/applications
        2. Enable the bot and copy the token
        3. Invite the bot to your Discord server with "Send Messages" permission
        4. Enter the bot token in the Web UI

        **MCP Integration (for AI/LLMs):**

        **Option 1: Public URL (with hash auth)**
        ```json
        {
          "mcpServers": {
            "discord-mcp": {
              "type": "http",
              "url": "https://discordmcp-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **Option 2: Local Docker connection (no auth required)**
        ```json
        {
          "mcpServers": {
            "discord-mcp": {
              "type": "http",
              "url": "http://discordmcp:9640/mcp"
            }
          }
        }
        ```

        **Available MCP Tools:**
        | Tool | Description |
        |------|-------------|
        | `send_message` | Send a text message to a Discord channel |
        | `send_embed` | Send a rich embed message to a Discord channel |
        | `list_channels` | List all text channels in a Discord server |
        | `echo` | Echo a message back (test tool) |
